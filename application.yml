spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jwt_demo_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root         # ← change to your MySQL username
    password: yourpassword # ← change to your MySQL password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update     # creates / updates tables automatically
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  # Must be Base64-encoded and at least 32 bytes (256 bits) long for HS256.
  # Generate one with: echo -n "your-secret-here-make-it-long-enough!!" | base64
  secret: eW91ci12ZXJ5LXN0cm9uZy1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc3QtMzItY2hhcnMhIQ==
  expiration: 86400000     # 24 hours in milliseconds

server:
  port: 8080
